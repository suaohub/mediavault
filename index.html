<!DOCTYPE html>
<html lang="zh" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MediaVault</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- ── Header ─────────────────────────────────────────────────── -->
<header id="hdr">
  <div class="logo">
    <span class="logo-mark"></span>
    <span class="logo-text">MediaVault</span>
  </div>

  <div class="search-wrap">
    <svg class="search-ico" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="22" y2="22"/></svg>
    <input id="search-input" type="text" placeholder="搜索媒体文件…" autocomplete="off" spellcheck="false" />
    <button id="search-clear" class="search-x" title="Clear">
      <svg width="9" height="9" viewBox="0 0 10 10" fill="currentColor"><path d="M1 1l8 8M9 1l-8 8" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
    </button>
  </div>

  <div class="h-right">
    <div class="theme-wrap" id="theme-wrap">
      <button class="btn btn-ghost icon-btn" id="theme-btn" title="主题">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="13.5" cy="6.5" r="1.5"/><circle cx="17.5" cy="10.5" r="1.5"/><circle cx="8.5" cy="7.5" r="1.5"/><circle cx="6.5" cy="12.5" r="1.5"/><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10c.926 0 1.648-.746 1.648-1.688 0-.437-.18-.835-.437-1.125-.29-.289-.438-.652-.438-1.125a1.64 1.64 0 0 1 1.668-1.668h1.996c3.051 0 5.555-2.503 5.555-5.554C21.965 6.012 17.461 2 12 2z"/></svg>
      </button>
      <div class="theme-pop" id="theme-pop">
        <div class="theme-pop-hd">外观主题</div>
        <div class="theme-grid" id="theme-grid"></div>
      </div>
    </div>

    <label class="btn btn-ghost" id="btn-files" for="input-files">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      文件
    </label>
    <label class="btn btn-ghost" id="btn-folder" for="input-folder">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
      文件夹
    </label>
    <button class="btn btn-ghost" id="btn-connect" title="连接目录后可自动恢复">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 7h-9l-2-2H4a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2z"/><path d="M8 13h8"/><path d="M12 9v8"/></svg>
      连接目录
    </button>
    <button class="btn btn-ghost" id="btn-perf" title="切换性能模式">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 2L3 14h7l-1 8 10-12h-7l1-8z"/></svg>
      性能：标准
    </button>
    <label class="btn btn-pri" for="input-files">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      导入
    </label>
  </div>

  <input id="input-files"  type="file" multiple accept="video/*,audio/*,.mkv,.flv,.ts,.flac,.opus" style="display:none" />
  <input id="input-folder" type="file" multiple webkitdirectory style="display:none" />
</header>

<!-- ── Subbar ──────────────────────────────────────────────────── -->
<div id="subbar">
  <span id="stat-txt"></span>

  <div class="chips-row" id="type-chips">
    <button class="chip on" data-filter="all">全部</button>
    <button class="chip" data-filter="video">
      <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>
      视频
    </button>
    <button class="chip" data-filter="audio">
      <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
      音频
    </button>
    <button class="chip" data-filter="recent">
      <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      最近
    </button>
    <button class="chip" data-filter="favorite">
      <svg width="10" height="10" viewBox="0 0 24 24" fill="currentColor"><path d="M12 21s-6.716-4.35-9.193-8.064C.725 9.814 2.29 5.5 6.28 5.5c2.132 0 3.41 1.108 4.22 2.279.81-1.171 2.088-2.279 4.22-2.279 3.99 0 5.555 4.314 3.473 7.436C18.716 16.65 12 21 12 21z"/></svg>
      收藏
    </button>
  </div>

  <div class="chip-div"></div>
  <div id="folder-chips" class="chips-row"></div>

  <div class="chip-div"></div>
  <div class="spd-wrap" id="spd-wrap">
    <button class="spd-btn" id="spd-btn">
      <span class="spd-dot"></span>
      <span>倍速</span>
      <span class="spd-val" id="spd-val">3×</span>
    </button>
    <div class="spd-pop" id="spd-pop">
      <span class="spd-opt" data-spd="1">1×</span>
      <span class="spd-opt" data-spd="1.5">1.5×</span>
      <span class="spd-opt on" data-spd="3">3×</span>
      <span class="spd-opt" data-spd="4">4×</span>
    </div>
  </div>
</div>

<!-- ── Main ────────────────────────────────────────────────────── -->
<main id="main">
  <div id="empty-state" class="empty">
    <div class="empty-icon">
      <svg width="64" height="64" viewBox="0 0 64 64" fill="none">
        <rect width="64" height="64" rx="18" fill="url(#eg)"/>
        <polygon points="26,20 48,32 26,44" fill="rgba(255,255,255,.9)"/>
        <defs><linearGradient id="eg" x1="0" y1="0" x2="64" y2="64"><stop stop-color="var(--ac)"/><stop offset="1" stop-color="var(--ac2)"/></linearGradient></defs>
      </svg>
    </div>
    <h2>拖拽媒体文件到这里</h2>
    <p>拖入视频或音频文件，或点击上方按钮选择文件。</p>
    <div class="empty-actions">
      <label class="btn btn-pri" for="input-files">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        选择文件
      </label>
      <label class="btn btn-ghost" for="input-folder">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
        选择文件夹
      </label>
    </div>
    <div class="empty-fmts">
      <span class="fmt">MP4</span><span class="fmt">MOV</span><span class="fmt">MKV</span>
      <span class="fmt">WEBM</span><span class="fmt">AVI</span><span class="fmt">MP3</span>
      <span class="fmt">FLAC</span><span class="fmt">WAV</span><span class="fmt">M4A</span>
    </div>
  </div>
  <div id="grid" class="grid" hidden></div>
</main>

<!-- ── Drop overlay ────────────────────────────────────────────── -->
<div id="drop-ov" class="drop-ov">
  <div class="drop-ov-inner">
    <div class="drop-icon">
      <svg width="52" height="52" viewBox="0 0 64 64" fill="none">
        <rect width="64" height="64" rx="18" fill="url(#dg)"/>
        <path d="M32 18v18M22 28l10 8 10-8M20 44h24" stroke="rgba(255,255,255,.95)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
        <defs><linearGradient id="dg" x1="0" y1="0" x2="64" y2="64"><stop stop-color="var(--ac)"/><stop offset="1" stop-color="var(--ac2)"/></linearGradient></defs>
      </svg>
    </div>
    <h2>松开即可导入</h2>
    <p>支持视频与音频文件</p>
  </div>
</div>

<!-- ── Player modal ────────────────────────────────────────────── -->
<div id="player" class="player" hidden>
  <video id="player-video" playsinline></video>
  <div class="player-overlay" id="player-overlay">
    <div class="player-top">
      <button class="pm-close" id="pm-close" title="关闭 (Esc)">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
      <span class="pm-title" id="pm-title"></span>
      <div class="pm-top-right">
        <span class="pm-idx" id="pm-idx"></span>
      </div>
    </div>
    <div class="player-bottom">
      <div class="pm-prog-row">
        <span id="pm-cur" class="pm-time">0:00</span>
        <div class="pm-track" id="pm-track">
          <div class="pm-track-bg">
            <div class="pm-prog" id="pm-prog"></div>
          </div>
          <div class="pm-thumb" id="pm-thumb"></div>
        </div>
        <span id="pm-dur" class="pm-time">0:00</span>
      </div>
      <div class="pm-ctrl-row">
        <button class="pmb" id="pm-prev" title="上一个 (P)">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><polygon points="19 20 9 12 19 4 19 20"/><line x1="5" y1="19" x2="5" y2="5" stroke="currentColor" stroke-width="2.5"/></svg>
        </button>
        <button class="pmb pmb-lg" id="pm-play" title="播放/暂停 (Space)">
          <svg id="pm-play-ico" width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        </button>
        <button class="pmb" id="pm-next" title="下一个 (N)">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 4 15 12 5 20 5 4"/><line x1="19" y1="5" x2="19" y2="19" stroke="currentColor" stroke-width="2.5"/></svg>
        </button>
        <div class="pm-vol">
          <button class="pm-vol-btn" id="pm-mute" title="静音 (M)">
            <svg id="pm-vol-ico" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
          </button>
          <div class="pm-vt" id="pm-vt"><div class="pm-vf" id="pm-vf"></div></div>
        </div>
        <div class="pm-kbd-hints">
          <span>空格 播放</span><span class="sep">·</span>
          <span>← → 快进退</span><span class="sep">·</span>
          <span>↑ ↓ 音量</span><span class="sep">·</span>
          <span>Esc 关闭</span>
        </div>
      </div>
    </div>
  </div>
  <div class="pm-spinner" id="pm-spinner" hidden></div>
</div>

<!-- ── Loading bar ─────────────────────────────────────────────── -->
<div id="loading-bar" class="loading-bar" style="width:0"></div>

<script type="module" src="app.js"></script>
</body>
</html>
