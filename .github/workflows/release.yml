name: 发布 — Windows & macOS

on:
  push:
    tags:
      - 'v*'           # 推送 v1.0.0 这类 tag 时触发
  workflow_dispatch:   # 也支持手动触发

# 允许写入 Release
permissions:
  contents: write

jobs:
  build-tauri:
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── macOS (Apple Silicon + x86_64 universal) ──
          - platform: macos-latest
            args: '--target universal-apple-darwin'

          # ── Windows x64 ──
          - platform: windows-latest
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      # ── Node.js ──
      - name: 安装 Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ── Rust ──
      - name: 安装 Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          # macOS universal 需要两个 target
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      # ── Rust 缓存（加速后续构建）──
      - name: 缓存 Rust 编译产物
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      # ── npm 依赖 ──
      - name: 安装前端依赖
        run: npm ci

      # ── Tauri 构建 & 发布 ──
      - name: 构建并发布 Tauri 应用
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS 签名（可选，不签名也能用，只是首次打开会有警告）
          # APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          # APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          # APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'MediaVault ${{ github.ref_name }}'
          releaseBody: |
            ## 下载说明

            | 平台 | 文件 | 说明 |
            |------|------|------|
            | macOS | `MediaVault_*.dmg` | 拖入 Applications 即可 |
            | Windows | `MediaVault_*_x64-setup.exe` | 标准安装包 |
            | Windows | `MediaVault_*_x64_en-US.msi` | MSI 安装包 |

            > **Windows 用户**：WebView2 运行时会自动下载安装（Windows 11 已内置）。
            > **macOS 用户**：首次打开时若提示"无法验证开发者"，在访达中右键点击应用 → 打开即可。
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
